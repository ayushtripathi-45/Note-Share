<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - NoteShare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-primary-custom { background-color: #6366f1; }
        .bg-dark-sidebar { background-color: #2e2e48; }
        .text-primary-custom { color: #6366f1; }
        .chat-container { height: calc(100vh - 80px); }
    </style>
</head>
<body class="bg-indigo-50/20 min-h-screen overflow-hidden">

    <!-- Navbar (Standardized) -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50 h-20" data-aos="fade-down">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-2xl font-bold text-primary-custom">NoteShare</a>
            <a href="javascript:history.back()" class="text-gray-500 hover:text-primary-custom font-medium ml-4 transition flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Back
            </a>
        </div>
        
        <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
            <a href="dashboard.html" class="hover:text-primary-custom transition">Dashboard</a>
            <a href="index.html#features" class="hover:text-primary-custom transition">Explore</a>
            <a href="friends.html" class="hover:text-primary-custom transition">Friends</a>
            <a href="chat.html" class="text-primary-custom border-b-2 border-primary-custom">Chat</a>
            <a href="about.html" class="hover:text-primary-custom transition">About</a>
        </div>

        <div id="nav-auth-section" class="flex items-center space-x-4"></div>
    </nav>

    <div class="flex chat-container">
        <!-- Sidebar -->
        <aside class="w-64 md:w-80 bg-dark-sidebar text-white flex flex-col" data-aos="fade-right">
            <div class="p-8 border-b border-white/5">
                <h2 class="text-2xl font-bold">Chats</h2>
            </div>
            <div id="chatListContainer" class="flex-grow overflow-y-auto">
                <!-- Chat threads rendered dynamically -->
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="flex-grow flex flex-col bg-white" data-aos="fade-left">
            <!-- Chat Header -->
            <div id="chatHeader" class="p-6 border-b border-gray-100 flex items-center space-x-4">
                <!-- Rendered dynamically -->
            </div>
            <div class="px-6 pb-4 bg-yellow-50 border-b border-yellow-100 text-yellow-700 text-sm">
                <strong class="font-semibold">Real-time chat coming soon.</strong> This page currently uses a preview mode for chat interactions.
            </div>

            <!-- Messages Area -->
            <div id="messagesContainer" class="flex-grow p-8 overflow-y-auto space-y-8 bg-indigo-50/10">
                <!-- Rendered dynamically -->
            </div>

            <!-- Input Area -->
            <div class="p-6 border-t border-gray-100 bg-white">
                <div class="flex space-x-4">
                    <input type="text" id="chatInput" placeholder="Type karo yahan..." class="flex-grow px-6 py-4 rounded-xl border border-indigo-50 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-indigo-50/30 text-sm">
                    <button id="sendChatBtn" class="bg-primary-custom text-white px-10 py-4 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:opacity-90 transition">
                        Send
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
    <script src="script.js"></script>
</body>
</html>
