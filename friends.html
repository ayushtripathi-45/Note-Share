<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - NoteShare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-primary-custom { background-color: #6366f1; }
        .text-primary-custom { color: #6366f1; }
    </style>
</head>
<body class="bg-indigo-50/20 min-h-screen overflow-x-hidden">

    <!-- Navbar (Standardized) -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50 mb-8" data-aos="fade-down">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-2xl font-bold text-primary-custom">NoteShare</a>
            <a href="javascript:history.back()" class="text-gray-500 hover:text-primary-custom font-medium ml-4 transition flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Back
            </a>
        </div>
        
        <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
            <a href="dashboard.html" class="hover:text-primary-custom transition">Dashboard</a>
            <a href="index.html#features" class="hover:text-primary-custom transition">Explore</a>
            <a href="friends.html" class="text-primary-custom border-b-2 border-primary-custom">Friends</a>
            <a href="chat.html" class="hover:text-primary-custom transition">Chat</a>
            <a href="about.html" class="hover:text-primary-custom transition">About</a>
        </div>

        <div class="flex space-x-4">
            <a href="auth.html" class="px-6 py-2 rounded-lg font-semibold text-primary-custom hover:bg-indigo-50 transition">Login</a>
            <a href="auth.html" class="px-6 py-2 rounded-lg font-semibold text-white bg-primary-custom hover:opacity-90 transition shadow-lg shadow-indigo-200">Signup</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pb-20">
        
        <div class="bg-white rounded-3xl shadow-lg border border-indigo-50 p-8 space-y-12" data-aos="fade-up">
            
            <!-- Friend ID Section -->
            <div class="bg-indigo-50/50 p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center border border-indigo-100" data-aos="zoom-in">
                <div class="flex items-center space-x-6 mb-4 md:mb-0">
                    <span class="text-gray-500 font-medium">Your Friend ID:</span>
                    <span id="friendId" class="text-3xl font-bold text-primary-custom tracking-wider">AYUSH123</span>
                </div>
                <button id="copyIdBtn" class="bg-primary-custom text-white px-10 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:opacity-90 transition w-full md:w-auto">
                    Copy ID
                </button>
            </div>

            <!-- Add Friend Section -->
            <div data-aos="fade-up">
                <h3 class="text-gray-500 uppercase text-xs font-bold tracking-widest border-b border-gray-100 pb-2 mb-6">Add Friend</h3>
                <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
                    <input type="text" placeholder="Enter Friend ID (e.g. RAHUL456)" class="flex-grow px-6 py-4 rounded-xl border border-indigo-100 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-indigo-50/30">
                    <button class="bg-primary-custom text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:opacity-90 transition">
                        Send Request
                    </button>
                </div>
            </div>

            <!-- Incoming Requests -->
            <div data-aos="fade-up">
                <h3 class="text-gray-500 uppercase text-xs font-bold tracking-widest border-b border-gray-100 pb-2 mb-6">Incoming Requests</h3>
                <div class="space-y-4">
                    <!-- Request 1 -->
                    <div class="flex items-center justify-between p-4 bg-white rounded-xl border border-gray-50 shadow-sm hover:shadow-md transition">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-indigo-500 text-white rounded-full flex items-center justify-center font-bold">A</div>
                            <div>
                                <p class="font-bold text-slate-800">Ankit Sharma</p>
                                <p class="text-xs text-gray-400">ANKIT789</p>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button class="px-6 py-2 bg-green-500 text-white text-xs font-bold rounded-full hover:opacity-90">Accept</button>
                            <button class="px-6 py-2 bg-red-400 text-white text-xs font-bold rounded-full hover:opacity-90">Reject</button>
                        </div>
                    </div>
                    <!-- Request 2 -->
                    <div class="flex items-center justify-between p-4 bg-white rounded-xl border border-gray-50 shadow-sm hover:shadow-md transition">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-purple-500 text-white rounded-full flex items-center justify-center font-bold">P</div>
                            <div>
                                <p class="font-bold text-slate-800">Priya Mishra</p>
                                <p class="text-xs text-gray-400">PRIYA234</p>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button class="px-6 py-2 bg-green-500 text-white text-xs font-bold rounded-full hover:opacity-90">Accept</button>
                            <button class="px-6 py-2 bg-red-400 text-white text-xs font-bold rounded-full hover:opacity-90">Reject</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Friends List -->
            <div data-aos="fade-up">
                <h3 class="text-gray-500 uppercase text-xs font-bold tracking-widest border-b border-gray-100 pb-2 mb-6">Friends List</h3>
                <div class="space-y-4">
                    <!-- Friend 1 -->
                    <div class="flex items-center justify-between p-4 bg-white rounded-xl border border-gray-50 shadow-sm hover:shadow-md transition">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-indigo-500 text-white rounded-full flex items-center justify-center font-bold">R</div>
                            <div>
                                <p class="font-bold text-slate-800">Rahul Verma</p>
                                <p class="text-xs text-gray-400">RAHUL456 • 8 notes shared</p>
                            </div>
                        </div>
                        <button class="px-8 py-2 border-2 border-primary-custom text-primary-custom text-xs font-bold rounded-full hover:bg-indigo-50 transition">
                            View Notes
                        </button>
                    </div>
                    <!-- Friend 2 -->
                    <div class="flex items-center justify-between p-4 bg-white rounded-xl border border-gray-50 shadow-sm hover:shadow-md transition">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 bg-indigo-500 text-white rounded-full flex items-center justify-center font-bold">A</div>
                            <div>
                                <p class="font-bold text-slate-800">Aman Gupta</p>
                                <p class="text-xs text-gray-400">AMAN101 • 3 notes shared</p>
                            </div>
                        </div>
                        <button class="px-8 py-2 border-2 border-primary-custom text-primary-custom text-xs font-bold rounded-full hover:bg-indigo-50 transition">
                            View Notes
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
    <script src="script.js"></script>
</body>
</html>
