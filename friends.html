<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends - NoteShare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-primary-custom { background-color: #6366f1; }
        .text-primary-custom { color: #6366f1; }
    </style>
</head>
<body class="bg-indigo-50/20 min-h-screen overflow-x-hidden">

    <!-- Navbar (Standardized) -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50 mb-8" data-aos="fade-down">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-2xl font-bold text-primary-custom">NoteShare</a>
            <a href="javascript:history.back()" class="text-gray-500 hover:text-primary-custom font-medium ml-4 transition flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Back
            </a>
        </div>
        
        <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
            <a href="dashboard.html" class="hover:text-primary-custom transition">Dashboard</a>
            <a href="index.html#features" class="hover:text-primary-custom transition">Explore</a>
            <a href="friends.html" class="text-primary-custom border-b-2 border-primary-custom">Friends</a>
            <a href="chat.html" class="hover:text-primary-custom transition">Chat</a>
            <a href="about.html" class="hover:text-primary-custom transition">About</a>
        </div>

        <div id="nav-auth-section" class="flex items-center space-x-4"></div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pb-20">
        
        <div class="bg-white rounded-3xl shadow-lg border border-indigo-50 p-8 space-y-12" data-aos="fade-up">
            
            <!-- Friend ID Section -->
            <div class="bg-indigo-50/50 p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center border border-indigo-100" data-aos="zoom-in">
                <div class="flex items-center space-x-6 mb-4 md:mb-0">
                    <span class="text-gray-500 font-medium">Your Friend ID:</span>
                    <span id="friendId" class="text-3xl font-bold text-primary-custom tracking-wider">AYUSH123</span>
                </div>
                <button id="copyIdBtn" class="bg-primary-custom text-white px-10 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:opacity-90 transition w-full md:w-auto">
                    Copy ID
                </button>
            </div>

            <!-- Add Friend Section -->
            <div data-aos="fade-up">
                <h3 class="text-gray-500 uppercase text-xs font-bold tracking-widest border-b border-gray-100 pb-2 mb-6">Add Friend</h3>
                <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4">
                    <input type="text" id="friendSearchId" placeholder="Enter Friend ID (e.g. RAHUL456)" class="flex-grow px-6 py-4 rounded-xl border border-indigo-100 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-indigo-50/30">
                    <button id="addFriendBtn" class="bg-primary-custom text-white px-8 py-4 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:opacity-90 transition">
                        Send Request
                    </button>
                </div>
            </div>

            <!-- Incoming Requests -->
            <div data-aos="fade-up">
                <h3 class="text-gray-500 uppercase text-xs font-bold tracking-widest border-b border-gray-100 pb-2 mb-6">Incoming Requests</h3>
                <div id="incomingRequestsContainer" class="space-y-4">
                    <!-- Dynamic Requests content -->
                </div>
            </div>

            <!-- Friends List -->
            <div data-aos="fade-up">
                <h3 class="text-gray-500 uppercase text-xs font-bold tracking-widest border-b border-gray-100 pb-2 mb-6">Friends List</h3>
                <div id="friendsListContainer" class="space-y-4">
                    <!-- Dynamic Friends list content -->
                </div>
            </div>

        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
    <script src="script.js"></script>
</body>
</html>
