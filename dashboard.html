<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NoteShare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-primary-custom { background-color: #6366f1; }
        .bg-dark-sidebar { background-color: #2e2e48; }
        .text-primary-custom { color: #6366f1; }
    </style>
</head>
<body class="bg-indigo-50/30 min-h-screen overflow-x-hidden">

    <!-- Navbar (Standardized) -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50" data-aos="fade-down">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-2xl font-bold text-primary-custom">NoteShare</a>
            <a href="javascript:history.back()" class="text-gray-500 hover:text-primary-custom font-medium ml-4 transition flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Back
            </a>
        </div>
        
        <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
            <a href="dashboard.html" class="text-primary-custom border-b-2 border-primary-custom">Dashboard</a>
            <a href="index.html#features" class="hover:text-primary-custom transition">Explore</a>
            <a href="friends.html" class="hover:text-primary-custom transition">Friends</a>
            <a href="chat.html" class="hover:text-primary-custom transition">Chat</a>
            <a href="about.html" class="hover:text-primary-custom transition">About</a>
        </div>

        <div id="nav-auth-section" class="flex items-center space-x-4"></div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12">

            <!-- Stats & Upload Row -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-indigo-50/50 p-8 rounded-2xl border border-indigo-100 text-center" data-aos="zoom-in" data-aos-delay="100">
                    <p id="statNotesCount" class="text-4xl font-bold text-primary-custom mb-1">0</p>
                    <p class="text-gray-500 text-sm font-medium">Notes</p>
                </div>
                <div class="bg-indigo-50/50 p-8 rounded-2xl border border-indigo-100 text-center" data-aos="zoom-in" data-aos-delay="200">
                    <p id="statFriendsCount" class="text-4xl font-bold text-primary-custom mb-1">0</p>
                    <p class="text-gray-500 text-sm font-medium">Friends</p>
                </div>
                <div class="bg-indigo-100/30 p-8 rounded-2xl border border-dashed border-indigo-200 flex items-center justify-center" data-aos="zoom-in" data-aos-delay="300">
                    <button id="uploadNoteBtn" class="bg-primary-custom text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:opacity-90 transition">
                        + Upload Note
                    </button>
                </div>
            </div>

            <!-- Notes List Section -->
            <div class="mb-6">
                <div class="flex justify-between items-center border-b border-gray-100 pb-2 mb-6">
                    <h3 class="text-gray-500 uppercase text-xs font-bold tracking-widest">Your Notes</h3>
                    <div id="filterIndicator" class="hidden text-xs bg-indigo-100 text-primary-custom px-3 py-1 rounded-full font-bold flex items-center space-x-2">
                        <span id="filterLabel">Filtered notes</span>
                        <button id="clearFilterBtn" class="hover:text-red-500 transition"><i class="fas fa-times"></i></button>
                    </div>
                </div>
                
                <div id="notesContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- Note Cards will be rendered dynamically -->
                </div>
            </div>
    </main>

    <!-- Upload/Edit Note Modal -->
    <div id="noteModal" class="modal-backdrop">
        <div class="modal-content p-8">
            <h3 id="noteModalTitle" class="text-2xl font-bold text-slate-800 mb-6">Upload Note</h3>
            <div class="space-y-4 flex-grow overflow-y-auto pr-1">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Subject / Tag</label>
                    <input type="text" id="noteTag" placeholder="e.g. AI/ML, COA, SE, DAA" class="w-full px-4 py-3 rounded-xl border border-indigo-100 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-indigo-50/30">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Note Title</label>
                    <input type="text" id="noteTitle" placeholder="Enter note title" class="w-full px-4 py-3 rounded-xl border border-indigo-100 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-indigo-50/30">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Note Details / Content</label>
                    <textarea id="noteContent" rows="5" placeholder="Enter key points or notes summary..." class="w-full px-4 py-3 rounded-xl border border-indigo-100 focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-indigo-50/30 text-sm"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Upload PDF / Image</label>
                    <input type="file" id="noteAttachment" accept=".pdf,image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-100 file:text-indigo-700" />
                    <p id="noteAttachmentPreview" class="mt-2 text-xs text-gray-500"></p>
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-8 pt-4 border-t border-gray-100">
                <button id="noteModalCancel" class="px-6 py-3 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition">Cancel</button>
                <button id="noteModalSave" class="px-6 py-3 bg-primary-custom text-white font-bold rounded-xl shadow-lg shadow-indigo-100 hover:opacity-90 transition">Save Note</button>
            </div>
        </div>
    </div>

    <!-- View Note Modal -->
    <div id="viewModal" class="modal-backdrop">
        <div class="modal-content p-8">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span id="viewModalTag" class="inline-block px-3 py-1 bg-indigo-50 text-primary-custom text-[10px] font-bold rounded-md mb-2">Tag</span>
                    <h3 id="viewModalTitle" class="text-2xl font-bold text-slate-800">Note Title</h3>
                </div>
                <button id="viewModalClose" class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 transition">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="flex-grow overflow-y-auto bg-slate-50 p-6 rounded-2xl border border-gray-100 pr-2 max-h-[40vh]">
                <p id="viewModalContent" class="text-slate-600 text-sm leading-relaxed whitespace-pre-wrap">Note Content goes here...</p>
                <p id="viewModalAttachment" class="mt-4 text-sm"></p>
            </div>
            <div class="flex justify-end mt-6">
                <button id="viewModalCloseBtn" class="px-6 py-3 bg-primary-custom text-white font-bold rounded-xl shadow-lg shadow-indigo-100 hover:opacity-90 transition">Close</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
    <script src="script.js"></script>
</body>
</html>
