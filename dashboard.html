<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NoteShare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .bg-primary-custom { background-color: #6366f1; }
        .bg-dark-sidebar { background-color: #2e2e48; }
        .text-primary-custom { color: #6366f1; }
    </style>
</head>
<body class="bg-indigo-50/30 min-h-screen overflow-x-hidden">

    <!-- Navbar (Standardized) -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50" data-aos="fade-down">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-2xl font-bold text-primary-custom">NoteShare</a>
            <a href="javascript:history.back()" class="text-gray-500 hover:text-primary-custom font-medium ml-4 transition flex items-center">
                <i class="fas fa-arrow-left mr-2"></i> Back
            </a>
        </div>
        
        <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
            <a href="dashboard.html" class="text-primary-custom border-b-2 border-primary-custom">Dashboard</a>
            <a href="index.html#features" class="hover:text-primary-custom transition">Explore</a>
            <a href="friends.html" class="hover:text-primary-custom transition">Friends</a>
            <a href="chat.html" class="hover:text-primary-custom transition">Chat</a>
            <a href="about.html" class="hover:text-primary-custom transition">About</a>
        </div>

        <div class="flex items-center space-x-4">
            <div class="w-10 h-10 bg-indigo-500 text-white rounded-full flex items-center justify-center font-bold text-sm shadow-lg shadow-indigo-100">AT</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-12">

            <!-- Stats & Upload Row -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-indigo-50/50 p-8 rounded-2xl border border-indigo-100 text-center" data-aos="zoom-in" data-aos-delay="100">
                    <p class="text-4xl font-bold text-primary-custom mb-1">12</p>
                    <p class="text-gray-500 text-sm font-medium">Notes</p>
                </div>
                <div class="bg-indigo-50/50 p-8 rounded-2xl border border-indigo-100 text-center" data-aos="zoom-in" data-aos-delay="200">
                    <p class="text-4xl font-bold text-primary-custom mb-1">5</p>
                    <p class="text-gray-500 text-sm font-medium">Friends</p>
                </div>
                <div class="bg-indigo-100/30 p-8 rounded-2xl border border-dashed border-indigo-200 flex items-center justify-center" data-aos="zoom-in" data-aos-delay="300">
                    <button class="bg-primary-custom text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-indigo-100 hover:opacity-90 transition">
                        + Upload Note
                    </button>
                </div>
            </div>

            <!-- Notes List Section -->
            <div class="mb-6">
                <h3 class="text-gray-500 uppercase text-xs font-bold tracking-widest border-b border-gray-100 pb-2 mb-6">Your Notes</h3>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <!-- Note Card 1 -->
                    <div class="bg-white p-6 rounded-2xl border-l-4 border-indigo-500 shadow-sm border border-gray-100 hover:shadow-md transition" data-aos="fade-up" data-aos-delay="100">
                        <span class="inline-block px-3 py-1 bg-indigo-50 text-primary-custom text-[10px] font-bold rounded-md mb-4">AI/ML</span>
                        <h4 class="text-xl font-bold text-slate-800 mb-6">Regression Notes</h4>
                        <div class="flex space-x-2">
                            <button class="px-4 py-2 bg-indigo-500 text-white text-xs font-bold rounded-lg hover:opacity-90">View</button>
                            <button class="px-4 py-2 bg-indigo-100 text-primary-custom text-xs font-bold rounded-lg hover:bg-indigo-200">Edit</button>
                            <button class="px-4 py-2 bg-red-400 text-white text-xs font-bold rounded-lg hover:opacity-90">Del</button>
                        </div>
                    </div>

                    <!-- Note Card 2 -->
                    <div class="bg-white p-6 rounded-2xl border-l-4 border-indigo-500 shadow-sm border border-gray-100 hover:shadow-md transition" data-aos="fade-up" data-aos-delay="200">
                        <span class="inline-block px-3 py-1 bg-indigo-50 text-primary-custom text-[10px] font-bold rounded-md mb-4">COA</span>
                        <h4 class="text-xl font-bold text-slate-800 mb-6">CPU Architecture</h4>
                        <div class="flex space-x-2">
                            <button class="px-4 py-2 bg-indigo-500 text-white text-xs font-bold rounded-lg hover:opacity-90">View</button>
                            <button class="px-4 py-2 bg-indigo-100 text-primary-custom text-xs font-bold rounded-lg hover:bg-indigo-200">Edit</button>
                            <button class="px-4 py-2 bg-red-400 text-white text-xs font-bold rounded-lg hover:opacity-90">Del</button>
                        </div>
                    </div>

                    <!-- Note Card 3 -->
                    <div class="bg-white p-6 rounded-2xl border-l-4 border-green-500 shadow-sm border border-gray-100 hover:shadow-md transition" data-aos="fade-up" data-aos-delay="300">
                        <span class="inline-block px-3 py-1 bg-indigo-50 text-primary-custom text-[10px] font-bold rounded-md mb-4">SE</span>
                        <h4 class="text-xl font-bold text-slate-800 mb-6">DFD Diagrams</h4>
                        <div class="flex space-x-2">
                            <button class="px-4 py-2 bg-indigo-500 text-white text-xs font-bold rounded-lg hover:opacity-90">View</button>
                            <button class="px-4 py-2 bg-indigo-100 text-primary-custom text-xs font-bold rounded-lg hover:bg-indigo-200">Edit</button>
                            <button class="px-4 py-2 bg-red-400 text-white text-xs font-bold rounded-lg hover:opacity-90">Del</button>
                        </div>
                    </div>

                    <!-- Note Card 4 -->
                    <div class="bg-white p-6 rounded-2xl border-l-4 border-orange-500 shadow-sm border border-gray-100 hover:shadow-md transition" data-aos="fade-up" data-aos-delay="400">
                        <span class="inline-block px-3 py-1 bg-indigo-50 text-primary-custom text-[10px] font-bold rounded-md mb-4">DAA</span>
                        <h4 class="text-xl font-bold text-slate-800 mb-6">Sorting Algorithms</h4>
                        <div class="flex space-x-2">
                            <button class="px-4 py-2 bg-indigo-500 text-white text-xs font-bold rounded-lg hover:opacity-90">View</button>
                            <button class="px-4 py-2 bg-indigo-100 text-primary-custom text-xs font-bold rounded-lg hover:bg-indigo-200">Edit</button>
                            <button class="px-4 py-2 bg-red-400 text-white text-xs font-bold rounded-lg hover:opacity-90">Del</button>
                        </div>
                    </div>
                </div>
            </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
    <script src="script.js"></script>
</body>
</html>
